    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#ffbd49" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffbd49" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="96" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="96" fill="url(#glow)"/>
  <circle cx="100" cy="100" r="96" fill="none" stroke="#ffbd49" stroke-width="3" opacity="0.25"/>
