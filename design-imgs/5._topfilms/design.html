<script>
        // Micro-interactions for the list items
        document.querySelectorAll('.glass-card').forEach((card, index) => {
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';

            setTimeout(() => {
                card.style.transition = 'all 0.6s cubic-bezier(0.22, 1, 0.36, 1)';
                card.style.opacity = index === 0 ? '1' : (1 - (index * 0.1)).toString();
                card.style.transform = index === 0 ? 'translateY(0) scale(1.05)' : 'translateY(0)';
            }, 300 + (index * 100));
        });

        // Atmospheric effect: Subtle mouse move parallax on background
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) - 0.5;
            const y = (e.clientY / window.innerHeight) - 0.5;
            const stack = document.querySelector('.poster-stack-bg');
            if(stack) {
                stack.style.transform = `rotate(-10deg) translate(${x * 20}px, ${y * 20}px)`;
            }
        });
    </script>
