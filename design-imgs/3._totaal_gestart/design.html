            backdrop-filter: blur(20px);

        }

        .mesh-gradient {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(229, 160, 13, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 20% 30%, rgba(150, 206, 255, 0.1) 0%, transparent 40%);
            animation: rotate 60s linear infinite;
            z-index: 0;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .play-icon-explosion span {
            position: absolute;
            color: rgba(255, 189, 73, 0.2);

        .progress-segment {
            height: 4px;

            border-radius: 2px;

        }

        .progress-segment.active {

        .float-animation {

        @keyframes float {

<script>
        // Simple script to generate the "explosion" of icons
        const container = document.getElementById('explosion-container');
        const iconTypes = ['play_arrow', 'movie', 'tv', 'theaters', 'video_library'];

        for (let i = 0; i < 40; i++) {
            const span = document.createElement('span');
            span.className = 'material-symbols-outlined';
            span.textContent = iconTypes[Math.floor(Math.random() * iconTypes.length)];

            // Random positioning
            const left = Math.random() * 100;
            const top = Math.random() * 100;
            const size = 20 + Math.random() * 60;
            const rotation = Math.random() * 360;
            const delay = Math.random() * 5;
            const opacity = 0.05 + Math.random() * 0.15;

            span.style.left = `${left}%`;
            span.style.top = `${top}%`;
            span.style.fontSize = `${size}px`;
            span.style.transform = `rotate(${rotation}deg)`;
            span.style.opacity = opacity;

            // Add a floating animation
            span.animate([
                { transform: `rotate(${rotation}deg) translateY(0px)` },
                { transform: `rotate(${rotation + 20}deg) translateY(-40px)` },
                { transform: `rotate(${rotation}deg) translateY(0px)` }
            ], {
                duration: 5000 + Math.random() * 10000,
                iterations: Infinity,
                delay: delay * 1000,
                easing: 'linear'
            });

            container.appendChild(span);
        }
    </script>
