<!-- Floating Background Interaction Script -->
<script>
        document.addEventListener('mousemove', (e) => {
            const canvas = document.querySelector('.story-container');
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (x > 0 && x < rect.width && y > 0 && y < rect.height) {
                const moveX = (x / rect.width - 0.5) * 15;
                const moveY = (y / rect.height - 0.5) * 15;

                document.querySelectorAll('.glass-card').forEach((card, index) => {
                    card.style.transform = `translate(${moveX * (index * 0.2)}px, ${moveY * (index * 0.2)}px) scale(1)`;
                });
            }
        });
    </script>
