<!DOCTYPE html><html class="dark" lang="nl"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700;800&amp;family=Inter:wght@400;600&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        .glass-surface {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }
        .mesh-gradient {
            background: radial-gradient(at 0% 0%, #131313 0%, transparent 50%),
                        radial-gradient(at 100% 0%, #593b00 0%, transparent 50%),
                        radial-gradient(at 100% 100%, #1f1f1f 0%, transparent 50%),
                        radial-gradient(at 0% 100%, #281900 0%, transparent 50%);
            background-size: 200% 200%;
            animation: meshMove 60s ease infinite;
        }
        @keyframes meshMove {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }
        .staircase-perspective {
            perspective: 1000px;
        }
        .stair-step {
            transform: rotateX(10deg) rotateY(-5deg) translateZ(0);
            transition: transform 0.5s ease-out;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error-container": "#ffdad6",
                        "outline-variant": "#514534",
                        "on-error": "#690005",
                        "primary-fixed-dim": "#ffba3e",
                        "error": "#ffb4ab",
                        "tertiary-container": "#49b5ff",
                        "surface-container-highest": "#353535",
                        "secondary-container": "#464a4d",
                        "on-tertiary-fixed": "#001e31",
                        "primary": "#ffbd49",
                        "tertiary-fixed-dim": "#91ccff",
                        "on-tertiary": "#003351",
                        "on-secondary": "#2d3134",
                        "on-tertiary-fixed-variant": "#004b73",
                        "on-secondary-fixed-variant": "#43474a",
                        "on-secondary-fixed": "#181c1f",
                        "surface-dim": "#131313",
                        "secondary-fixed": "#e0e3e7",
                        "on-secondary-container": "#b5b9bc",
                        "inverse-surface": "#e2e2e2",
                        "surface": "#131313",
                        "on-surface-variant": "#d6c4ad",
                        "surface-container-lowest": "#0e0e0e",
                        "secondary-fixed-dim": "#c4c7cb",
                        "on-primary-fixed": "#281900",
                        "tertiary-fixed": "#cce5ff",
                        "primary-container": "#e5a00d",
                        "primary-fixed": "#ffdeae",
                        "error-container": "#93000a",
                        "on-primary-fixed-variant": "#604100",
                        "outline": "#9e8e7a",
                        "on-tertiary-container": "#004569",
                        "on-background": "#e2e2e2",
                        "inverse-primary": "#7f5700",
                        "on-primary-container": "#593b00",
                        "tertiary": "#96ceff",
                        "surface-tint": "#ffba3e",
                        "on-primary": "#432c00",
                        "surface-container": "#1f1f1f",
                        "on-surface": "#e2e2e2",
                        "surface-variant": "#353535",
                        "background": "#131313",
                        "secondary": "#c4c7cb",
                        "surface-bright": "#393939",
                        "surface-container-low": "#1b1b1b",
                        "surface-container-high": "#2a2a2a",
                        "inverse-on-surface": "#303030"
                    },
                    "spacing": {
                        "gutter": "20px",
                        "stack-xl": "40px",
                        "stack-lg": "24px",
                        "safe-area-top": "64px",
                        "stack-xs": "4px",
                        "stack-sm": "8px",
                        "safe-area-bottom": "48px",
                        "stack-md": "16px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "headline-md": ["Hanken Grotesk"],
                        "label-md": ["Inter"],
                        "headline-lg": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"],
                        "display-xl": ["Hanken Grotesk"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                        "label-md": ["14px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "700"}],
                        "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                        "display-xl": ["72px", {"lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "800"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "1.2", "fontWeight": "700"}],
                        "display-xl-mobile": ["56px", {"lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "800"}]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-surface selection:bg-primary/30 overflow-hidden">
<!-- Progress Indicator Wrapper -->
<div class="fixed top-4 left-0 w-full px-5 flex gap-1 z-[60]">
<!-- 19 Segments total, 7th is active -->
<div class="h-1 flex-1 rounded-full bg-white"></div>
<div class="h-1 flex-1 rounded-full bg-white"></div>
<div class="h-1 flex-1 rounded-full bg-white"></div>
<div class="h-1 flex-1 rounded-full bg-white"></div>
<div class="h-1 flex-1 rounded-full bg-white"></div>
<div class="h-1 flex-1 rounded-full bg-white"></div>
<div class="h-1 flex-1 rounded-full bg-white"></div>
<div class="h-1 flex-1 rounded-full bg-white/20"></div>
<div class="h-1 flex-1 rounded-full bg-white/20"></div>
<div class="h-1 flex-1 rounded-full bg-white/20"></div>
<div class="h-1 flex-1 rounded-full bg-white/20"></div>
<div class="h-1 flex-1 rounded-full bg-white/20"></div>
<div class="h-1 flex-1 rounded-full bg-white/20"></div>
<div class="h-1 flex-1 rounded-full bg-white/20"></div>
<div class="h-1 flex-1 rounded-full bg-white/20"></div>
<div class="h-1 flex-1 rounded-full bg-white/20"></div>
<div class="h-1 flex-1 rounded-full bg-white/20"></div>
<div class="h-1 flex-1 rounded-full bg-white/20"></div>
<div class="h-1 flex-1 rounded-full bg-white/20"></div>
</div>
<!-- Top Navigation Bar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-gutter pt-safe-area-top h-16 no-border bg-gradient-to-b from-black/60 to-transparent">
<h1 class="font-headline-md text-headline-md-mobile text-primary tracking-tighter">Plex Wrapped</h1>
<div class="flex gap-4">
<button class="transition-opacity duration-200 active:scale-95 hover:opacity-80">
<span class="material-symbols-outlined text-primary">share</span>
</button>
<button class="transition-opacity duration-200 active:scale-95 hover:opacity-80">
<span class="material-symbols-outlined text-primary">close</span>
</button>
</div>
</header>
<!-- Main Canvas -->
<main class="relative h-screen w-full flex flex-col items-center justify-center mesh-gradient px-gutter overflow-hidden">
<!-- Animated Background Element -->
<div class="absolute inset-0 z-0 opacity-20 pointer-events-none">
<div class="absolute top-1/4 -right-20 w-80 h-80 bg-primary-container rounded-full blur-[120px]"></div>
<div class="absolute bottom-1/4 -left-20 w-80 h-80 bg-tertiary-container rounded-full blur-[120px]"></div>
</div>
<!-- Staircase Content -->
<div class="relative z-10 w-full max-w-sm staircase-perspective flex flex-col gap-stack-lg">
<div class="text-center mb-8">
<p class="font-label-md text-label-md text-primary tracking-widest uppercase mb-2">Diepe Duik</p>
<h2 class="font-display-lg text-headline-lg text-on-surface leading-none">Serie Diepte</h2>
</div>
<!-- Step 3: Episodes (Top/Deepest) -->
<div class="stair-step glass-surface rounded-xl p-stack-lg border border-white/10 shadow-2xl z-30 translate-x-4 -rotate-2">
<div class="flex flex-col">
<span class="font-display-xl-mobile text-display-xl-mobile text-primary leading-none">2.700</span>
<span class="font-headline-md text-headline-md text-on-surface-variant">afleveringen</span>
</div>
</div>
<!-- Step 2: Seasons -->
<div class="stair-step glass-surface rounded-xl p-stack-lg border border-white/10 shadow-xl z-20 -translate-y-6 -translate-x-2 rotate-1">
<div class="flex flex-col">
<span class="font-display-lg text-display-lg text-on-surface leading-none">310</span>
<span class="font-headline-md text-headline-md text-on-surface-variant">seizoenen</span>
</div>
</div>
<!-- Step 1: Series -->
<div class="stair-step glass-surface rounded-xl p-stack-lg border border-white/10 shadow-lg z-10 -translate-y-12 translate-x-1 rotate-3">
<div class="flex flex-col">
<span class="font-headline-lg text-headline-lg text-secondary-fixed-dim leading-none">142</span>
<span class="font-headline-md text-headline-md text-on-surface-variant">series</span>
</div>
</div>
<!-- Cinematic Description -->
<div class="mt-8 text-center px-4">
<p class="font-body-md text-body-md text-on-surface-variant italic">
                    "Je hebt genoeg content verslonden om een heel decennium te vullen."
                </p>
</div>
</div>
<!-- Cinematic Pattern Overlay (TV Scanline feel) -->
<div class="absolute inset-0 pointer-events-none opacity-10 bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.25)_50%),linear-gradient(90deg,rgba(255,0,0,0.06),rgba(0,255,0,0.02),rgba(0,0,255,0.06))] bg-[length:100%_2px,3px_100%]"></div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-between items-center px-10 pb-safe-area-bottom no-border bg-gradient-to-t from-black/80 via-black/20 to-transparent h-24">
<button class="text-on-surface/50 p-4 hover:text-primary transition-transform scale-110 active:scale-95">
<span class="material-symbols-outlined">chevron_left</span>
</button>
<button class="bg-primary text-on-primary rounded-full p-4 hover:text-primary transition-transform scale-110 shadow-lg active:scale-95">
<span class="material-symbols-outlined">chevron_right</span>
</button>
</nav>
<script>
        // Subtle tilt animation on mouse/touch
        document.addEventListener('mousemove', (e) => {
            const steps = document.querySelectorAll('.stair-step');
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;

            steps.forEach((step, index) => {
                const factor = (index + 1) * 0.5;
                step.style.transform = `rotateX(${10 + y * factor}deg) rotateY(${-5 + x * factor}deg) translateZ(${index * 10}px)`;
            });
        });

        // Entrance animation
        window.addEventListener('DOMContentLoaded', () => {
            const steps = document.querySelectorAll('.stair-step');
            steps.forEach((step, index) => {
                step.style.opacity = '0';
                step.style.transform = 'translateY(50px) rotateX(20deg)';
                setTimeout(() => {
                    step.style.transition = 'all 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67)';
                    step.style.opacity = '1';
                    step.style.transform = '';
                }, 300 + (index * 150));
            });
        });
    </script>
</body></html>
