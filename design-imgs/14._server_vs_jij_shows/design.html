<style>
        body {
            background-color: #131313;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .story-container {
            width: 100vw;
            height: 100vh;
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .mesh-gradient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, #432c00 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, #003351 0%, transparent 50%),
                        radial-gradient(circle at 50% 50%, #131313 0%, #0e0e0e 100%);
            z-index: -1;
            animation: meshMove 20s ease-in-out infinite alternate;
        }
        @keyframes meshMove {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
        }
        .poster-glow {
            box-shadow: 0 0 30px rgba(229, 160, 13, 0.2);
        }
        .progress-segment {
            height: 4px;
            flex-grow: 1;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.2);
        }
        .progress-segment.active {
            background: #FFFFFF;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background">
<div class="story-container">
<!-- Dynamic Mesh Background -->
<div class="mesh-gradient"></div>
<!-- Progress Indicators -->
<div class="absolute top-4 left-gutter right-gutter flex gap-1 z-50">
<!-- 19 segments, 14 active -->
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment"></div>
<div class="progress-segment"></div>
<div class="progress-segment"></div>
<div class="progress-segment"></div>
<div class="progress-segment"></div>
</div>
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 no-border bg-gradient-to-b from-black/60 to-transparent flex justify-between items-center px-gutter pt-8 h-20">
<button class="transition-opacity duration-200 active:scale-95 text-primary">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tighter">Plex Wrapped</h1>
<button class="transition-opacity duration-200 active:scale-95 text-primary">
<span class="material-symbols-outlined" data-icon="share">share</span>
</button>
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col items-center justify-center px-gutter pt-24 pb-safe-area-bottom">
<div class="text-center mb-stack-xl animate-fade-in">
<h2 class="font-display-lg-mobile text-display-lg-mobile text-on-surface leading-tight">
                    Je hebt een <span class="text-primary">verfijnde</span> smaak.
                </h2>
</div>
<div class="relative w-full flex items-center justify-center gap-4 mt-8">
<!-- Server Choice Card (Left) -->
<div class="flex flex-col items-center animate-slide-up-left" style="animation-delay: 200ms;">
<div class="relative group">
<div class="glass-card rounded-xl overflow-hidden w-36 aspect-[2/3] poster-glow transition-transform duration-500 group-hover:scale-105">
<img alt="The Bear TV Show Poster" class="w-full h-full object-cover grayscale-[0.3]" data-alt="A cinematic TV show poster for 'The Bear', featuring a chaotic kitchen environment with a chef in a blue apron, reflecting the intense and professional culinary atmosphere. The lighting is dramatic and warm, matching the Plex aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCAt9S6_l2N6rBclD12zZfD5Z7pQ5zY7nF9vP2R1Q8yX-4M-3v-6N-8N-0N-2N-4N-6N-8N-0N-2N-4N-6N-8N-0N-2N-4N-6N-8N-0N-2N-4N-6N-8N-0N-2N-4N-6N-8N-0N-2N-4N-6N-8N-0N-2N-4N-6N-8N-0N-2N-4N-6N-8N-0N-2N-4N-6N-8N-0N-2N-4N-6N-8N-0N-2">
</div>
<div class="absolute -top-3 -left-3 bg-surface-container-highest px-3 py-1 rounded-full border border-outline-variant">
<span class="font-label-md text-label-md text-on-surface-variant">Server #1</span>
</div>
</div>
<p class="font-headline-md-mobile text-headline-md-mobile text-on-surface-variant mt-stack-md text-center max-w-[140px]">The Bear</p>
</div>
<!-- VS Badge -->
<div class="absolute z-10 bg-primary text-on-primary w-12 h-12 rounded-full flex items-center justify-center font-display-lg-mobile text-[20px] shadow-xl border-4 border-background">
                    VS
                </div>
<!-- Your Choice Card (Right) -->
<div class="flex flex-col items-center animate-slide-up-right" style="animation-delay: 400ms;">
<div class="relative group">
<div class="glass-card rounded-xl overflow-hidden w-40 aspect-[2/3] poster-glow border-2 border-primary/30 transition-transform duration-500 group-hover:scale-105">
<img alt="Succession TV Show Poster" class="w-full h-full object-cover" data-alt="A sophisticated TV show poster for 'Succession', featuring figures in high-end business attire within a luxurious, modern boardroom. The lighting is cold and powerful, with golden accents reflecting corporate wealth and intense family dynamics." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBV9p-2f_8S_h8l_7R8s_h9S_r8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7R8S_h-7">
</div>
<div class="absolute -top-3 -right-3 bg-primary text-on-primary px-3 py-1 rounded-full shadow-lg">
<span class="font-label-md text-label-md">Jouw #1</span>
</div>
</div>
<p class="font-headline-md-mobile text-headline-md-mobile text-primary mt-stack-md text-center max-w-[140px]">Succession</p>
</div>
</div>
<!-- Stats Quote -->
<div class="mt-stack-xl glass-card p-stack-md rounded-2xl w-full text-center">
<p class="font-body-md-mobile text-body-md-mobile text-on-surface-variant italic">"Terwijl de server in de keuken van Chicago stond, koos jij voor de boardroom van Waystar Royco."</p>
</div>
</main>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-between items-center px-10 pb-10 bg-gradient-to-t from-black/80 via-black/20 to-transparent">
<button class="scale-110 transition-transform hover:text-primary text-on-surface/50 p-4">
<span class="material-symbols-outlined" data-icon="chevron_left">chevron_left</span>
</button>
<button class="scale-110 transition-transform hover:text-primary text-on-surface/50 p-4">
<span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span>
</button>
</nav>
</div>
<style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideUpLeft {
            from { opacity: 0; transform: translate(-20px, 40px) rotate(-5deg); }
            to { opacity: 1; transform: translate(0, 0) rotate(0deg); }
        }
        @keyframes slideUpRight {
            from { opacity: 0; transform: translate(20px, 40px) rotate(5deg); }
            to { opacity: 1; transform: translate(0, 0) rotate(0deg); }
        }
        .animate-fade-in {
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-slide-up-left {
            opacity: 0;
            animation: slideUpLeft 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-slide-up-right {
            opacity: 0;
            animation: slideUpRight 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
<script>
        // Simple interactive hover effect for the posters
        document.querySelectorAll('.glass-card').forEach(card => {
            card.addEventListener('touchstart', () => {
                card.style.transform = 'scale(1.05)';
                card.style.borderColor = 'rgba(255, 189, 73, 0.6)';
            });
            card.addEventListener('touchend', () => {
                card.style.transform = 'scale(1)';
                card.style.borderColor = 'rgba(255, 255, 255, 0.1)';
            });
        });
    </script>
</body></html>
