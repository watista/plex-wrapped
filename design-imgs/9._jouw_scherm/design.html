        .tv-silhouette {

            height: 160px;

            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(229, 160, 13, 0.1);
            transform: rotate(-5deg);
            z-index: 0;
        }
        .tv-silhouette:nth-child(2) {
            transform: rotate(8deg) translate(40px, 100px);
            background: rgba(255, 255, 255, 0.03);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);

            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
        }
        .progress-segment {
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.2);

        }
        .progress-segment.active {

<script>
        // Simple interactive glow effect that follows mouse/touch slightly
        document.addEventListener('mousemove', (e) => {
            const silhouettes = document.querySelectorAll('.tv-silhouette');
            const moveX = (e.clientX - window.innerWidth / 2) / 50;
            const moveY = (e.clientY - window.innerHeight / 2) / 50;

            silhouettes.forEach((s, i) => {
                const factor = i === 0 ? 1 : -1;
                s.style.transform = `rotate(${i === 0 ? -5 : 8}deg) translate(${moveX * factor}px, ${moveY * factor}px)`;
            });
        });

        // Touch support for the same effect
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const moveX = (touch.clientX - window.innerWidth / 2) / 30;
            const moveY = (touch.clientY - window.innerHeight / 2) / 30;

            const silhouettes = document.querySelectorAll('.tv-silhouette');
            silhouettes.forEach((s, i) => {
                const factor = i === 0 ? 1 : -1;
                s.style.transform = `rotate(${i === 0 ? -5 : 8}deg) translate(${moveX * factor}px, ${moveY * factor}px)`;
            });
        });
    </script>
