<style>
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); opacity: 0.2; }
            50% { transform: translateY(-20px) rotate(10deg); opacity: 0.4; }
            100% { transform: translateY(0px) rotate(0deg); opacity: 0.2; }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        .glass-surface {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }
        .mesh-gradient {
            background: radial-gradient(circle at 20% 30%, #0088cc 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, #004466 0%, transparent 50%),
                        radial-gradient(circle at 50% 50%, #131313 0%, #0e0e0e 100%);
        }
    </style>

<div class="flex gap-4">

<span class="material-symbols-outlined text-primary cursor-pointer active:scale-95 transition-transform" data-icon="close">close</span>
</div>

<!-- Background Decorative Elements -->
<div class="absolute inset-0 pointer-events-none opacity-20">
<span class="material-symbols-outlined absolute top-1/4 left-1/4 text-9xl animate-float" data-icon="send" style="animation-delay: 0s;">send</span>
<span class="material-symbols-outlined absolute bottom-1/4 right-1/4 text-8xl animate-float" data-icon="send" style="animation-delay: 2s;">send</span>
<span class="material-symbols-outlined absolute top-1/2 left-3/4 text-7xl animate-float" data-icon="send" style="animation-delay: 4s;">send</span>
</div>

<div class="w-full h-full flex flex-col md:flex-row relative z-10 px-gutter pt-24 pb-32">

<div class="absolute top-24 left-gutter right-gutter text-center">
<p class="font-label-md text-label-md text-tertiary-fixed-dim uppercase tracking-widest mb-2">Community Demand</p>
<h1 class="font-display-lg text-headline-lg text-white">Telegram Requests</h1>

<p class="font-display-xl text-white">42</p>

</div>
<!-- Series Card -->

<span class="material-symbols-outlined text-tertiary text-5xl mb-4" data-icon="tv">tv</span>
<h2 class="font-headline-md text-headline-md text-on-surface-variant mb-1">Series</h2>
<p class="font-display-xl text-white">15</p>
<p class="font-label-md text-label-md text-on-surface-variant mt-2">EPISODES DELIVERED</p>

</div>

<script>
        // Micro-interaction for the progress bar
        window.addEventListener('load', () => {
            const bar = document.querySelector('.bg-primary-container');
            if(bar) {
                bar.style.width = '0%';
                setTimeout(() => {
                    bar.style.width = '78.9%';
                }, 300);
            }
        });
    </script>
