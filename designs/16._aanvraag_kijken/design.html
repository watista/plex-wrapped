<script>
        // Micro-interaction for the progress bar or stats
        document.addEventListener('DOMContentLoaded', () => {
            const numbers = document.querySelectorAll('.font-display-xl');
            numbers.forEach(num => {
                const target = parseInt(num.innerText);
                let current = 0;
                const increment = target / 30;
                const timer = setInterval(() => {
                    current += increment;
                    if (current >= target) {
                        num.innerText = target;
                        clearInterval(timer);
                    } else {
                        num.innerText = Math.floor(current);
                    }
                }, 30);
            });
        });
    </script>
