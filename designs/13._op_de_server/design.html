<style>
        body {
            background-color: #000;

        .story-container {
            width: 100%;
            max-width: 430px;
            height: 100%;
            max-height: 932px;
            position: relative;
            overflow: hidden;
            background: #131313;
        }
        .mesh-gradient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 30%, rgba(229, 160, 13, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(127, 87, 0, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 50% 10%, rgba(255, 189, 73, 0.1) 0%, transparent 40%);
            animation: mesh-shift 20s ease-in-out infinite alternate;
            z-index: 0;
        }
        @keyframes mesh-shift {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.1) translate(-2%, 2%); }
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-left: 1px solid rgba(255, 255, 255, 0.15);
        }
        .progress-bar {
            display: flex;
            gap: 4px;
            padding: 0 20px;
            position: absolute;
            top: 12px;
            width: 100%;
            z-index: 60;
        }
        .progress-segment {
            height: 4px;
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-segment.active {
            background: #FFFFFF;
        }
        .progress-segment.past {
            background: #FFFFFF;
        }
        .progress-segment.current .fill {
            height: 100%;
            width: 70%;
            background: #FFFFFF;
        }
    </style>

<script>
        // Micro-interactions and atmospheric effects
        document.addEventListener('DOMContentLoaded', () => {
            const progressFill = document.querySelector('.progress-segment.current .fill');
            if (progressFill) {
                progressFill.animate([
                    { width: '0%' },
                    { width: '70%' }
                ], {
                    duration: 3500,
                    easing: 'linear',
                    fill: 'forwards'
                });
            }

            // Simple parallax on mouse move or device tilt (if supported)
            const mesh = document.querySelector('.mesh-gradient');
            document.addEventListener('mousemove', (e) => {
                const x = e.clientX / window.innerWidth;
                const y = e.clientY / window.innerHeight;
                mesh.style.transform = `scale(1.1) translate(${(x - 0.5) * 10}px, ${(y - 0.5) * 10}px)`;
            });
        });
    </script>
<style>
        @keyframes bounce-subtle {

        }

        /* Safe area top/bottom padding for mobile notch handling */
        .pt-safe-area-top {
