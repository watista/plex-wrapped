            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",

            "spacing": {
                    "gutter": "20px",
                    "stack-xl": "40px",

<style>
        body {
            background-color: #131313;
            overflow: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }
        .mesh-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(at 0% 0%, #432c00 0px, transparent 50%),
                        radial-gradient(at 100% 0%, #181c1f 0px, transparent 50%),
                        radial-gradient(at 100% 100%, #593b00 0px, transparent 50%),
                        radial-gradient(at 0% 100%, #131313 0px, transparent 50%);
            filter: blur(80px);
            animation: meshMove 60s infinite alternate ease-in-out;
        }
        @keyframes meshMove {
            0% { transform: scale(1); }
            100% { transform: scale(1.2); }
        }
        .streak-animate {
            animation: streakPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes streakPop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen font-body-md text-on-surface">
<!-- Atmospheric Mesh Background -->
<div class="mesh-gradient"></div>
<!-- Story Container (9:16 Aspect Ratio) -->
<main class="relative w-full max-w-[430px] h-[932px] overflow-hidden bg-background shadow-2xl md:rounded-[40px] flex flex-col">
<!-- Segmented Progress Bar -->
<div class="absolute top-4 left-0 w-full px-gutter flex gap-1 z-50">
<!-- 10 out of 19 segments -->
<script>
                const container = document.currentScript.parentElement;
                for (let i = 1; i <= 19; i++) {
                    const segment = document.createElement('div');
                    segment.className = `h-1 flex-1 rounded-full ${i <= 10 ? 'bg-white' : 'bg-white/20'}`;
                    container.appendChild(segment);
                }
            </script>
</div>
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-gutter pt-safe-area-top h-16 no-border bg-gradient-to-b from-black/60 to-transparent">
<button class="text-primary transition-opacity duration-200 active:scale-95 hover:opacity-80">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-headline-md text-headline-md-mobile text-primary tracking-tighter">Plex Wrapped</h1>
<button class="text-primary transition-opacity duration-200 active:scale-95 hover:opacity-80">
<span class="material-symbols-outlined" data-icon="share">share</span>
</button>
</header>
<!-- Main Content Canvas -->
<section class="flex-1 flex flex-col items-center justify-center px-gutter relative">
<!-- Hero Streak Visual -->
<div class="relative w-full flex flex-col items-center justify-center streak-animate">
<!-- Background visual element -->
<div class="absolute -z-10 w-64 h-64 opacity-20 blur-3xl bg-primary-container rounded-full"></div>
<div class="glass-card p-10 rounded-full flex flex-col items-center justify-center border border-white/10 mb-stack-lg shadow-2xl aspect-square w-72 h-72">
<span class="material-symbols-outlined text-primary text-[80px] mb-stack-sm" style="font-variation-settings: 'FILL' 1;">calendar_today</span>
<div class="flex items-baseline gap-1">
<span class="font-display-xl-mobile text-display-xl-mobile text-primary">15</span>
</div>
</div>
<div class="text-center">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-stack-xs">15 dagen op rij</h2>
<p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest">Langste streak</p>
</div>
</div>
<!-- Bento-style detail grid -->
<div class="grid grid-cols-2 gap-4 mt-stack-xl w-full">
<div class="glass-card p-4 rounded-xl flex flex-col">
<span class="material-symbols-outlined text-primary-container text-2xl mb-2">schedule</span>
<span class="font-label-md text-label-md text-on-surface-variant">Totaal tijd</span>
<span class="font-headline-md text-headline-md-mobile">42u 12m</span>
</div>
<div class="glass-card p-4 rounded-xl flex flex-col">
<span class="material-symbols-outlined text-primary-container text-2xl mb-2">bolt</span>
<span class="font-label-md text-label-md text-on-surface-variant">Drukste dag</span>
<span class="font-headline-md text-headline-md-mobile">Zondag</span>
</div>
</div>
<!-- Descriptive Image Background -->
<div class="absolute inset-0 -z-20">
<img alt="Cinematic background" class="w-full h-full object-cover opacity-30 grayscale" data-alt="A moody, high-contrast cinematic shot of an analog calendar page with a glowing orange neon circle around a sequence of dates. The lighting is low-key, focused on the textures of the paper and the vibrant orange glow that symbolizes a winning streak. The style is modern tech-noir with deep shadows and sharp, warm highlights, perfectly matching the Plex Orange brand identity and a celebratory, analytic mood." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA62c7IFIHmb0sQ6wzTu3bjQ-iDMhMG0sveWp96uDcT9Rs5IxKCe1k3J7fytkq6iS8hYAqSW1fCwDttctF-U755ug5G2chZGHDSYzU_xRS4T0Yi3-uwTWvvCFO8bM76ug2n0bgu6g1jp5Fcq6Vs4Wf-ueZeqaC_RA15KVNYO2rBOMD3qziw3n6S4YW7JSTTgbOtnkArnc8il-W-CTQ9r0EgRTdx99WjHL8qtuxJvYNryRM_nPz06F5CWrnosRlj9UMcoGKPp1QqFLbh">
</div>
</section>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-between items-center px-10 pb-safe-area-bottom no-border bg-gradient-to-t from-black/80 via-black/20 to-transparent">
<button class="text-on-surface/50 p-4 scale-110 transition-transform hover:text-primary">
<span class="material-symbols-outlined" data-icon="chevron_left">chevron_left</span>
</button>
<div class="flex items-center gap-4">
<button class="bg-primary text-on-primary rounded-full p-4 scale-110 transition-transform shadow-lg">
<span class="material-symbols-outlined" data-icon="share" style="font-variation-settings: 'FILL' 1;">share</span>
</button>
</div>
<button class="text-on-surface/50 p-4 scale-110 transition-transform hover:text-primary">
<span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span>
</button>
</nav>
<!-- Dynamic Micro-interactions -->
<script>
            // Subtle parallax effect on mouse/touch
            const card = document.querySelector('.streak-animate');
            document.addEventListener('mousemove', (e) => {
                const x = (e.clientX - window.innerWidth / 2) / 40;
                const y = (e.clientY - window.innerHeight / 2) / 40;
                card.style.transform = `translate(${x}px, ${y}px)`;
            });

            // Tap to next simulation
            document.querySelector('main').addEventListener('click', (e) => {
                if (e.target.closest('button')) return;
                // Visual feedback for tap
                const feedback = document.createElement('div');
                feedback.className = 'absolute w-20 h-20 bg-white/10 rounded-full blur-xl animate-ping pointer-events-none';
                feedback.style.left = `${e.clientX - 40}px`;
                feedback.style.top = `${e.clientY - 40}px`;
                document.body.appendChild(feedback);
                setTimeout(() => feedback.remove(), 500);
            });
        </script>
</main>
</body></html>
