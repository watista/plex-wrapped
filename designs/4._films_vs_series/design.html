<!DOCTYPE html><html class="dark" lang="en"><head>

<style>
        body {
            background-color: #131313;
            color: #e2e2e2;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .canvas-9-16 {
            aspect-ratio: 9/16;
            height: 100vh;
            max-height: 900px;
            width: auto;
            position: relative;
            overflow: hidden;
            background: radial-gradient(circle at top right, #432c00 0%, #131313 70%),
                        radial-gradient(circle at bottom left, #003351 0%, #131313 70%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }
        .progress-segment {
            height: 4px;
            flex: 1;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.2);
        }
        .progress-segment.active {
            background: #FFFFFF;
        }
        .chart-container {
            position: relative;
            width: 280px;
            height: 280px;
        }
        .mesh-gradient {
            position: absolute;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, rgba(229, 160, 13, 0.15) 0%, transparent 60%);
            animation: pulse 4s ease-in-out infinite alternate;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 0.8; }
        }
    </style>
</head>
<body>
<div class="canvas-9-16 shadow-2xl relative">
<!-- Background Image/Atmosphere -->
<div class="absolute inset-0 opacity-40">
<img class="w-full h-full object-cover" data-alt="A cinematic, low-angle shot of a dark theater interior with glowing amber and deep blue light reflections on velvet seats. The atmosphere is sophisticated and celebratory, matching a premium Plex Wrapped aesthetic. The lighting is moody with soft bokeh effects from distant screens, creating a high-energy cinematic background blur." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAPBF8pVgJ7AQYZSayTJo2pTQWTSrt-t91kuZgu6O7uU_rjYFQJtSXUGgQ4c2ppXdLlNe_LTYki1l-7E2rjFDMG_qWuSK7MkMZsDR1vDRByMsQfqVNLr96f9wu6dMaUYKMi-Ix2r6ZVZO6BR3j98Osckcue5_6dfYsnH3LOi-6GZ6Sf6IgOrVnTEeaNjwlltbr7G3I2x5qt7JIn8uMCgbBUIYdLUo236ivvteQUN3WzD1gA8bdbN-a2qVouf3HTFVXIJIeBldMZZ-ZU">
</div>
<!-- Progress Indicator -->
<div class="absolute top-4 left-0 w-full px-5 flex gap-1 z-50">
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment"></div>
<div class="progress-segment"></div>
<div class="progress-segment"></div>
<div class="progress-segment"></div>
<div class="progress-segment"></div>
<div class="progress-segment"></div>
<div class="progress-segment"></div>
<div class="progress-segment"></div>
<div class="progress-segment"></div>
<div class="progress-segment"></div>
<div class="progress-segment"></div>
<div class="progress-segment"></div>
<div class="progress-segment"></div>
<div class="progress-segment"></div>
<div class="progress-segment"></div>
</div>
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 no-border bg-gradient-to-b from-black/60 to-transparent flex justify-between items-center px-gutter pt-safe-area-top h-16">
<button class="transition-opacity duration-200 active:scale-95 hover:opacity-80 text-primary">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tighter">Plex Wrapped</h1>
<button class="transition-opacity duration-200 active:scale-95 hover:opacity-80 text-primary">
<span class="material-symbols-outlined">share</span>
</button>
</header>
<!-- Main Content -->
<main class="relative h-full flex flex-col items-center justify-center px-gutter pt-20">
<div class="text-center mb-stack-lg">
<p class="font-label-md text-label-md text-primary uppercase tracking-widest mb-stack-xs">De Grote Balans</p>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Movies vs TV</h2>
</div>
<!-- Bento/Circular Graph Hybrid -->
<div class="chart-container flex items-center justify-center mb-stack-xl">
<div class="mesh-gradient"></div>
<!-- Circular Visualizer -->
<svg class="w-full h-full -rotate-90 transform" viewBox="0 0 100 100">
<!-- Background Circle -->
<circle cx="50" cy="50" fill="none" r="40" stroke="rgba(255,255,255,0.1)" stroke-width="8"></circle>
<!-- TV Segment (Large) -->
<circle class="transition-all duration-1000 ease-out" cx="50" cy="50" fill="none" r="40" stroke="#ffbd49" stroke-dasharray="230 251.2" stroke-width="8"></circle>
<!-- Movies Segment (Small) -->
<circle class="transition-all duration-1000 ease-out" cx="50" cy="50" fill="none" r="40" stroke="#96ceff" stroke-dasharray="21 251.2" stroke-dashoffset="-230" stroke-width="8"></circle>
</svg>
<div class="absolute inset-0 flex flex-col items-center justify-center">
<span class="font-display-lg text-display-lg text-white">4:19</span>
<span class="font-label-md text-label-md text-on-surface-variant">Statistieken</span>
</div>
</div>
<!-- Stats Grid -->
<div class="grid grid-cols-2 gap-stack-md w-full">
<!-- TV Box -->
<div class="glass-card p-stack-md rounded-xl flex flex-col items-center animate-pulse">
<span class="material-symbols-outlined text-primary mb-stack-sm" style="font-variation-settings: 'FILL' 1;">live_tv</span>
<span class="font-display-lg text-headline-lg text-primary">2.700</span>
<span class="font-label-md text-label-md text-on-surface-variant">afleveringen</span>
</div>
<!-- Movie Box -->
<div class="glass-card p-stack-md rounded-xl flex flex-col items-center">
<span class="material-symbols-outlined text-tertiary mb-stack-sm" style="font-variation-settings: 'FILL' 1;">movie</span>
<span class="font-display-lg text-headline-lg text-tertiary">150</span>
<span class="font-label-md text-label-md text-on-surface-variant">films</span>
</div>
</div>
<!-- Narrative Text -->
<div class="mt-stack-xl text-center">
<p class="font-body-md text-body-md text-on-surface opacity-80 max-w-[280px]">
                    Je bent een echte serie-bingewatcher. Voor elke film die je keek, verslond je maar liefst 18 afleveringen.
                </p>
</div>
</main>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-between items-center px-10 pb-safe-area-bottom bg-gradient-to-t from-black/80 via-black/20 to-transparent">
<button class="scale-110 transition-transform hover:text-primary text-on-surface/50 p-4">
<span class="material-symbols-outlined">chevron_left</span>
</button>
<button class="scale-110 transition-transform hover:text-primary text-on-surface/50 p-4">
<span class="material-symbols-outlined">chevron_right</span>
</button>
</nav>
</div>
<script>
        // Simple micro-interaction for entry animation
        document.addEventListener('DOMContentLoaded', () => {
            const circles = document.querySelectorAll('circle');
            circles.forEach(circle => {
                circle.style.strokeDashoffset = circle.getAttribute('stroke-dashoffset');
            });
        });
    </script>
</body></html>
