<script>
        // Micro-interaction for the heatmap dots
        document.querySelectorAll('.heat-map-dot').forEach(dot => {
            dot.addEventListener('mouseenter', () => {
                dot.style.boxShadow = '0 0 15px rgba(255, 189, 73, 0.6)';
            });
            dot.addEventListener('mouseleave', () => {
                dot.style.boxShadow = 'none';
            });
        });

        // Simple wave animation logic
        const waves = document.querySelectorAll('path');
        let offset = 0;
        function animateWaves() {
            offset += 0.05;
            waves.forEach((wave, i) => {
                const shift = Math.sin(offset + i) * 5;
                wave.setAttribute('transform', `translate(0, ${shift})`);
            });
            requestAnimationFrame(animateWaves);
        }
        animateWaves();
    </script>
