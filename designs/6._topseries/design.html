            border-left: 1px solid rgba(255, 255, 255, 0.1);

        .progress-segment {
            height: 4px;

            flex-grow: 1;
        }
        .progress-segment.active { background: #FFFFFF; }
        .progress-segment.inactive { background: rgba(255, 255, 255, 0.2); }

        .list-item-enter {
            animation: slideIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            opacity: 0;
        }

            from { transform: translateX(30px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }

<script>
        // Simple micro-interaction for item tapping
        document.querySelectorAll('.glass-panel').forEach(panel => {
            panel.addEventListener('touchstart', () => {
                panel.style.transform = 'scale(0.98)';
                panel.style.transition = 'transform 0.1s ease';
            });
            panel.addEventListener('touchend', () => {
                panel.style.transform = 'scale(1)';
            });
        });

        // Atmospheric parallax effect
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            const container = document.querySelector('.story-container');
            container.style.backgroundPosition = `${x * 20}% ${y * 20}%`;
        });
    </script>
