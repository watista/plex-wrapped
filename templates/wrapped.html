<!DOCTYPE html>
<html lang="nl" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#131313">
  <link rel="icon" href="/static/images/plextv-tile.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/images/plextv-tile.svg">
  <title>Jouw Plex Wrapped</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/wrapped.css">
  <link rel="stylesheet" href="/static/css/slides.css">
  {% if google_analytics_id %}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ google_analytics_id }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ google_analytics_id }}');
  </script>
  {% endif %}
</head>
<body class="wrapped-page" data-year="{{ year }}" data-share-mode="{{ 'true' if share_mode else 'false' }}">
  <div class="story-viewport">
    <div class="progress-bar" id="progressBar" aria-hidden="true"></div>

    <header class="story-header">
      <button type="button" class="icon-btn" id="btnClose" aria-label="Uitloggen">
        <span class="material-symbols-outlined">logout</span>
      </button>
      <h1 class="story-header-brand">
        <img class="story-header-brand__logo" src="/static/images/plextv-tile.svg" alt="" aria-hidden="true">
        <span class="story-header-title">
          <span class="story-header-title__muted">Ple</span><span class="story-header-title__accent">x</span><span class="story-header-title__muted"> </span><span class="story-header-title__muted">Wra</span><span class="story-header-title__accent">pp</span><span class="story-header-title__muted">ed</span>
        </span>
      </h1>
      <div class="story-header-spacer" aria-hidden="true"></div>
      <button type="button" class="icon-btn icon-btn--music" id="btnMusic" aria-label="Muziek dempen" aria-pressed="false">
        <span class="material-symbols-outlined">music_note</span>
      </button>
    </header>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Je wrapped wordt geladen…</p>
    </div>

    <div id="slides" class="slides hidden"></div>
  </div>
  <script src="/static/js/carousel.js"></script>
  <script src="/static/js/music.js"></script>
  <script src="/static/js/html2canvas.min.js"></script>
  <script src="/static/js/analytics.js"></script>
  <script src="/static/js/device-icons.js"></script>
  <script src="/static/js/wrapped.js"></script>
</body>
</html>
