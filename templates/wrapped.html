<!DOCTYPE html>
<html lang="nl" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#131313">
  <title>Jouw Plex Wrapped</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/wrapped.css">
</head>
<body class="wrapped-page" data-year="{{ year }}">
  <div class="story-viewport">
    <div class="progress-bar" id="progressBar" aria-hidden="true"></div>

    <header class="story-header">
      <button type="button" class="icon-btn" id="btnClose" aria-label="Sluiten">
        <span class="material-symbols-outlined">close</span>
      </button>
      <h1 class="story-header-title">Plex Wrapped</h1>
      <button type="button" class="icon-btn" id="btnShare" aria-label="Delen">
        <span class="material-symbols-outlined">share</span>
      </button>
    </header>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Je wrapped wordt geladen…</p>
    </div>

    <div id="slides" class="slides hidden"></div>

    <nav class="story-nav" id="storyNav" aria-label="Navigatie">
      <button type="button" class="nav-btn" id="btnPrev" aria-label="Vorige slide">
        <span class="material-symbols-outlined">chevron_left</span>
      </button>
      <button type="button" class="nav-btn nav-btn-primary" id="btnNext" aria-label="Volgende slide">
        <span class="material-symbols-outlined nav-icon-fill">chevron_right</span>
      </button>
    </nav>
  </div>
  <script src="/static/js/wrapped.js"></script>
</body>
</html>
